<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MES Planner — Lập kế hoạch sản xuất tổng thể</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== MES Planner — Modern SaaS / Linear style ===== */
:root{
  --navy:#0F2A4A; --navy-deep:#0B2138; --navy-soft:#173a61;
  --green:#16A34A; --green-soft:#dcfce7;
  --red:#DC2626; --red-soft:#fee2e2;
  --amber:#D97706; --amber-soft:#fef3c7;
  --blue:#2563EB; --blue-soft:#dbeafe;
  --bg:#F6F7F9; --card:#FFFFFF; --raised:#FBFCFD;
  --bd:#E6E8EC; --bd-strong:#d2d6dc;
  --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05);
  --shadow-lg:0 10px 25px -5px rgba(16,24,40,.12);
  --c-LC1783:#1f2937; --c-LC1786:#b45309; --c-LC1787:#0e7490;
  --sb-w:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{line-height:1.2;font-weight:650;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sb-w);flex:0 0 var(--sb-w);background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);color:#cdd9e8;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;padding:18px 14px;z-index:30}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1DB954,#16A34A);display:flex;align-items:center;justify-content:center;font-weight:800;color:#04230f;font-size:16px}
.brand .t1{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.01em}
.brand .t2{color:#7f93ab;font-size:11px}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav .sec{color:#5f7491;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:#aebdd0;font-size:13.5px;font-weight:500;transition:.12s;position:relative}
.nav a .ic{width:18px;text-align:center;font-size:15px;opacity:.9}
.nav a .num{margin-left:auto;font-size:10.5px;color:#6f84a0;background:rgba(255,255,255,.06);padding:1px 7px;border-radius:20px}
.nav a:hover{background:var(--navy-soft);color:#fff}
.nav a.active{background:rgba(29,185,84,.14);color:#fff}
.nav a.active::before{content:'';position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:#1DB954}
.nav a.active .ic{color:#1DB954;opacity:1}
.sb-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:12px;display:flex;align-items:center;gap:10px}
.sb-foot .av{width:32px;height:32px;border-radius:50%;background:#1DB954;color:#04230f;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.sb-foot .nm{color:#dbe5f0;font-size:12.5px;font-weight:600}
.sb-foot .rl{color:#7f93ab;font-size:11px}

.main{margin-left:var(--sb-w);flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:16px;padding:0 26px;position:sticky;top:0;z-index:20}
.topbar .crumb{font-size:12.5px;color:var(--ink-3)}
.topbar h2{font-size:16px;font-weight:680}
.topbar .spacer{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:7px 12px;color:var(--ink-3);font-size:13px;width:240px}
.search input{border:0;background:transparent;outline:0;flex:1;font-size:13px;color:var(--ink)}
.content{padding:24px 26px 60px;max-width:1500px;width:100%}
.page{display:none}
.page.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-size:23px}
.page-head p{color:var(--ink-2);font-size:13.5px;margin-top:3px}
.page-head .spacer{flex:1}

/* cards */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:18px}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--bd)}
.card-h h3{font-size:14.5px;font-weight:650}
.card-h .sub{color:var(--ink-3);font-size:12px}
.card-h .spacer{flex:1}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{color:var(--ink-2);font-size:12.5px;font-weight:550;display:flex;align-items:center;gap:7px}
.kpi .lab .ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.kpi .val{font-size:30px;font-weight:720;letter-spacing:-.02em;margin-top:10px}
.kpi .cap{font-size:12px;margin-top:4px;color:var(--ink-3)}
.kpi .trend{font-weight:650}
.t-up{color:var(--green)} .t-dn{color:var(--red)} .t-wn{color:var(--amber)}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
.bg-gray{background:#f1f5f9;color:#475569}
.bg-green{background:var(--green-soft);color:#15803d}
.bg-red{background:var(--red-soft);color:#b91c1c}
.bg-amber{background:var(--amber-soft);color:#b45309}
.bg-blue{background:var(--blue-soft);color:#1d4ed8}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* tables */
.tbl-wrap{overflow:auto;border-radius:var(--radius)}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap}
table.tbl th{position:sticky;top:0;background:var(--raised);color:var(--ink-2);font-weight:650;font-size:11px;text-transform:uppercase;letter-spacing:.03em;text-align:left;padding:10px 12px;border-bottom:1px solid var(--bd);z-index:1}
table.tbl td{padding:9px 12px;border-bottom:1px solid #f0f2f5}
table.tbl tr:hover td{background:#fafbfc}
table.tbl td.num,table.tbl th.num{text-align:right;font-variant-numeric:tabular-nums}
table.tbl tr:last-child td{border-bottom:0}
.colorchip{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.colorchip .sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.12)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--bd-strong);background:#fff;color:var(--ink);padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;transition:.12s}
.btn:hover{background:#f8fafc}
.btn.pri{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.pri:hover{background:#143a64}
.btn.grn{background:var(--green);border-color:var(--green);color:#fff}
.btn.grn:hover{filter:brightness(1.05)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.gho{border-color:transparent;background:transparent;color:var(--ink-2)}
.btn.gho:hover{background:#f1f5f9}

/* toggles / chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--bd-strong);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--ink-2);transition:.12s;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--navy)}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.chip.on.grn{background:var(--green);border-color:var(--green)}
.seg{display:inline-flex;background:#eef1f5;border-radius:9px;padding:3px}
.seg button{border:0;background:transparent;padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--ink-2)}
.field input,.field select{border:1px solid var(--bd-strong);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:0;background:#fff;width:100%}
.field input:focus,.field select:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(15,42,74,.08)}
.lock{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--green)}

/* meter */
.meter{height:8px;border-radius:6px;background:#eef1f5;overflow:hidden}
.meter > i{display:block;height:100%;border-radius:6px;background:var(--green)}
.meter.am > i{background:var(--amber)} .meter.rd > i{background:var(--red)} .meter.bl > i{background:var(--blue)}

/* gantt */
.gantt{overflow:auto;border:1px solid var(--bd);border-radius:var(--radius);background:#fff}
.gantt-inner{min-width:900px}
.g-row{display:flex;align-items:stretch;border-bottom:1px solid #f0f2f5}
.g-row:hover{background:#fafbfc}
.g-side{width:230px;flex:0 0 230px;padding:8px 12px;border-right:1px solid var(--bd);position:sticky;left:0;background:#fff;z-index:2}
.g-row:hover .g-side{background:#fafbfc}
.g-side .o1{font-weight:650;font-size:12.5px}
.g-side .o2{font-size:11px;color:var(--ink-3)}
.g-track{position:relative;flex:1;min-height:42px}
.g-bar{position:absolute;top:8px;height:24px;border-radius:6px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:11px;font-weight:600;box-shadow:var(--shadow);overflow:hidden}
.g-head{display:flex;position:sticky;top:0;background:var(--raised);z-index:3;border-bottom:1px solid var(--bd)}
.g-head .g-side{background:var(--raised);font-size:11px;color:var(--ink-2);font-weight:650;text-transform:uppercase}
.g-head .g-cells{display:flex;flex:1}
.g-cell{flex:0 0 var(--cw);text-align:center;font-size:10.5px;color:var(--ink-3);padding:7px 0;border-left:1px solid #f0f2f5}
.g-cell.mon{color:var(--ink-2);font-weight:700;background:#eef2f7}

/* alerts list */
.alist{display:flex;flex-direction:column}
.aitem{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid #f0f2f5;align-items:flex-start}
.aitem:last-child{border-bottom:0}
.aitem .ai{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 30px}
.aitem .at{font-weight:600;font-size:13px}
.aitem .ad{font-size:12px;color:var(--ink-3);margin-top:1px}
.aitem .spacer{flex:1}

/* misc */
.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:0}
.muted{color:var(--ink-3)}
.sp8{height:8px}.sp16{height:16px}.sp24{height:24px}
.flex{display:flex;align-items:center;gap:10px}
.wrap{flex-wrap:wrap}
.right{margin-left:auto}
.dropzone{border:2px dashed var(--bd-strong);border-radius:var(--radius);padding:30px;text-align:center;color:var(--ink-3);background:var(--raised)}
.dropzone .big{font-size:30px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-2)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--bd);margin-bottom:16px}
.tabbar button{border:0;background:transparent;padding:10px 14px;font-size:13px;font-weight:600;color:var(--ink-3);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabbar button.on{color:var(--navy);border-bottom-color:var(--navy)}
.note{font-size:12px;color:var(--ink-3);background:var(--raised);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
small.req{color:var(--red)}
.kbd{font-size:11px;background:#eef1f5;border:1px solid var(--bd);border-radius:5px;padding:1px 6px;color:var(--ink-2)}

</style>
</head>

/* ===== SOLVER ===== */
let solverMode='color';     // color | size | combined
let planRows=[];            // {factory,key,color,start,end,days,total,daily,split,dev}
let planRange={min:null,max:null};

function capForDate(f,d){
  const t=iso(d);
  for(const p of CAP[f]){ if(t>=p.from && t<p.to) return p.cap; }
  return CAP[f][CAP[f].length-1].cap;
}
function runSolver(){
  // group orders
  let groups={};
  ORDERS.forEach(o=>{
    let key = solverMode==='color'? o.color : solverMode==='size'? 'ALL' : o.color;
    (groups[key]=groups[key]||[]).push(o);
  });
  // build sorted group list by earliest deadline
  let glist=Object.entries(groups).map(([k,arr])=>({
    key:k, orders:arr, color:(solverMode==='size'?colorList[0]:k),
    total:arr.reduce((s,o)=>s+o.total,0),
    deadline:arr.reduce((m,o)=>o.deadline<m?o.deadline:m,'9999')
  })).sort((a,b)=>a.deadline<b.deadline?-1:1);

  planRows=[];
  let lafCursor=dline('2026-07-01');
  glist.forEach(g=>{
    // LAF block (BTP đi trước, + test buffer)
    const lafCap=capForDate('LAF',lafCursor);
    const prodDays=Math.max(1,Math.ceil(g.total/lafCap));
    const lafStart=new Date(lafCursor);
    const lafEnd=addDays(lafStart,prodDays-1+testBufferDays);
    const split = (solverMode==='combined')? Math.round(g.total/ SIZES.filter(s=>true).length) : 0;
    planRows.push({factory:'LAF',orders:g.orders,key:g.key,color:g.color,start:lafStart,end:lafEnd,
      days:prodDays+testBufferDays,total:g.total,daily:Math.round(g.total/prodDays),
      splitTotal:g.total,splitTarget:g.total-(split? (g.total% (split||1)):0),dev:0,deadline:g.deadline});
    // LVF block starts after LAF prod (lag) 
    const lvfStart=addDays(lafStart,prodDays+lvfLagDays);
    const lvfCap=capForDate('LVF',lvfStart);
    const lvfDays=Math.max(1,Math.ceil(g.total/lvfCap));
    const lvfEnd=addDays(lvfStart,lvfDays-1);
    const dev=Math.round(g.total - lvfCap*lvfDays);
    planRows.push({factory:'LVF',orders:g.orders,key:g.key,color:g.color,start:lvfStart,end:lvfEnd,
      days:lvfDays,total:g.total,daily:Math.round(g.total/lvfDays),
      splitTotal:g.total,splitTarget:lvfCap*lvfDays,dev:dev,deadline:g.deadline});
    // advance LAF cursor (parallelize a little: next group starts after ~60% of this one)
    lafCursor=addDays(lafStart,Math.max(1,Math.round(prodDays*0.7)));
  });
  // range
  let all=planRows.flatMap(r=>[r.start,r.end]);
  planRange.min=new Date(Math.min(...all));
  planRange.max=new Date(Math.max(...all));
}

function stBadge(s){const m={'Chưa SX':'bg-gray','Đang SX':'bg-blue','Hoàn tất':'bg-amber','Đã xuất':'bg-green'};return `<span class="badge ${m[s]||'bg-gray'}">${s}</span>`;}

const LS_KEY='mes_state_v1';
let ACTUALS={};   // { [stt]: { laf:{size:qty}, lvf:{size:qty} } }
let SHIPPED={};   // { [stt]: true }
let REVISIONS=[]; // lịch sử bản kế hoạch mỗi lần xoay theo đơn mới
let EXTRA_ORDERS=[]; // đơn hàng nhập thêm lúc chạy (ngoài 43 đơn gốc)
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify({ACTUALS,SHIPPED,BTP,CAP,testBufferDays,lvfLagDays,SHIFTS,PHOM,KHUON,planPhom,planKhuon,capLocked,REVISIONS,EXTRA_ORDERS}));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem(LS_KEY)||'null');if(s){ACTUALS=s.ACTUALS||{};SHIPPED=s.SHIPPED||{};if(s.BTP)BTP=s.BTP;if(s.CAP)CAP=s.CAP;if(s.testBufferDays!=null)testBufferDays=s.testBufferDays;if(s.lvfLagDays!=null)lvfLagDays=s.lvfLagDays;if(s.SHIFTS)SHIFTS=s.SHIFTS;if(s.PHOM)PHOM=s.PHOM;if(s.KHUON)KHUON=s.KHUON;if(s.planPhom!=null)planPhom=s.planPhom;if(s.planKhuon!=null)planKhuon=s.planKhuon;if(s.capLocked!=null)capLocked=s.capLocked;if(s.REVISIONS)REVISIONS=s.REVISIONS;if(s.EXTRA_ORDERS){EXTRA_ORDERS=s.EXTRA_ORDERS;EXTRA_ORDERS.forEach(o=>{if(!ORDERS.some(x=>x.stt===o.stt))ORDERS.push(o);});}return true;}}catch(e){}return false;}
function actualTotal(stt,f){const a=ACTUALS[stt];if(!a||!a[f])return 0;return SIZES.reduce((s,z)=>s+(+a[f][z]||0),0);}
function seedDemo(){
  ACTUALS={};SHIPPED={};
  ORDERS.forEach((o,i)=>{
    const frac=i<14?1:i<28?0.5:0;
    if(frac>0){const laf={},lvf={};SIZES.forEach(z=>{if(o.sizes[z]){laf[z]=Math.round(o.sizes[z]*Math.min(1,frac+0.1));lvf[z]=Math.round(o.sizes[z]*frac);}});ACTUALS[o.stt]={laf,lvf};}
    if(i<6) SHIPPED[o.stt]=true;
  });
}
function recompute(){
  ORDERS.forEach(o=>{
    o.lafDone=actualTotal(o.stt,'laf');
    o.lvfDone=actualTotal(o.stt,'lvf');
    o.done=o.lvfDone;
    if(SHIPPED[o.stt]) o.status='Đã xuất';
    else if(o.lvfDone>=o.total&&o.total>0) o.status='Hoàn tất';
    else if(o.lafDone>0||o.lvfDone>0) o.status='Đang SX';
    else o.status='Chưa SX';
  });
}
window.resetTestData=()=>{
  if(!confirm('Reset TOÀN BỘ dữ liệu test?\n\nXoá: sản lượng thực tế đã nhập, tiến độ, trạng thái, xác nhận xuất, kế hoạch đã chạy.\nGIỮ NGUYÊN: toàn bộ số liệu đơn hàng gốc từ Excel.')) return;
  ACTUALS={};SHIPPED={};saveState();
  solverMode='color';planRows=[];runSolver();recompute();
  alert('✅ Đã reset dữ liệu test. '+ORDERS.length+' đơn hàng gốc được giữ nguyên — tất cả về trạng thái "Chưa SX".');

};
/* ===== Plan revisions (Kế hoạch cập nhật theo đơn đặt hàng mới) ===== */
function snapshotPlan(trigger){
  runSolver();
  const rows=planRows.map(r=>({factory:r.factory,key:r.key,color:r.color,start:iso(r.start),end:iso(r.end),days:r.days,total:r.total,daily:r.daily,deadline:r.deadline}));
  const rev={id:Date.now(),ts:new Date().toISOString(),trigger:trigger||'Cập nhật kế hoạch',mode:solverMode,orderCount:ORDERS.length,totalPairs:ORDERS.reduce((s,o)=>s+(o.total||0),0),rows};
  REVISIONS.push(rev);saveState();return rev;
}
window.addOrder=(o)=>{
  const stt=ORDERS.reduce((m,x)=>Math.max(m,+x.stt||0),0)+1;
  const ord={stt,brand:o.brand||'Adidas',country:o.country||'',tvs:o.tvs||'',cust:o.cust||'',code:o.code||('NEW'+stt),color:o.color||('NEW'+stt),colorName:o.colorName||'',shape:o.shape||'',sizes:o.sizes||{},total:o.total||0,deadline:o.deadline||'2026-12-31',dow:o.dow||''};
  ORDERS.push(ord);EXTRA_ORDERS.push(ord);recompute();
  snapshotPlan('Thêm đơn mới: '+ord.code+' · '+(ord.color||'')+' · '+fmt(ord.total)+' đôi · giao '+(ord.deadline||'').split('-').reverse().join('/'));

  mount('revisions');
};

window.exportPlan=()=>{
  try{
    if(!planRows.length) runSolver();
    const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const vn=s=>s? String(s).split('-').reverse().join('/') : '';
    const cell=v=>`<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`;
    const num=v=>`<Cell><Data ss:Type="Number">${(+v)||0}</Data></Cell>`;
    const row=c=>`<Row>${c}</Row>`;
    const hd=(...ls)=>row(ls.map(l=>`<Cell ss:StyleID="hdr"><Data ss:Type="String">${esc(l)}</Data></Cell>`).join(''));
    const late=r=>iso(r.end)>(r.deadline||'9999');
    const HEAD=hd('Nhà máy','Lô/Nhóm','Mã màu','Bắt đầu','Kết thúc','Số ngày','SL/ngày','Tổng SL (đôi)','Deadline','Trạng thái');
    const body=rows=>rows.map(r=>row(cell(r.factory)+cell(r.key)+cell(r.color)+cell(vn(iso(r.start)))+cell(vn(iso(r.end)))+num(r.days)+num(r.daily)+num(r.total)+cell(vn(r.deadline))+cell(late(r)?'TRỄ HẠN':'Đúng hạn'))).join('');
    const laf=planRows.filter(r=>r.factory==='LAF');
    const lvf=planRows.filter(r=>r.factory==='LVF');
    const keys=[...new Set(planRows.map(r=>r.key))];
    const totLvf=lvf.reduce((s,r)=>s+r.total,0);
    const lateN=lvf.filter(late).length;
    const kHead=hd('Lô/Nhóm','Mã màu','LAF bắt đầu','LAF kết thúc','LVF bắt đầu','LVF kết thúc','Tổng SL (đôi)','Deadline','Trạng thái');
    const kBody=keys.map(k=>{const L=laf.find(r=>r.key===k),V=lvf.find(r=>r.key===k),B=V||L;return row(cell(k)+cell(B.color)+cell(L?vn(iso(L.start)):'')+cell(L?vn(iso(L.end)):'')+cell(V?vn(iso(V.start)):'')+cell(V?vn(iso(V.end)):'')+num(B.total)+cell(vn(B.deadline))+cell(V&&late(V)?'TRỄ HẠN':'Đúng hạn'));}).join('');
    const kpi=[row(cell('BÁO CÁO KẾ HOẠCH SẢN XUẤT — MES PLANNER')),row(cell('Ngày xuất')+cell(new Date().toLocaleString('vi-VN'))),row(cell('Chế độ solver')+cell(solverMode)),row(cell('Khoảng kế hoạch')+cell(vn(iso(planRange.min))+' → '+vn(iso(planRange.max)))),row(cell('Tổng số lô')+num(keys.length)),row(cell('Tổng sản lượng (đôi)')+num(totLvf)),row(cell('Số lô trễ hạn')+num(lateN)),row(cell(''))].join('');
    const ws=(n,inner)=>`<Worksheet ss:Name="${esc(n)}"><Table>${inner}</Table></Worksheet>`;
    const xml='<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="hdr"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#0F2A4A" ss:Pattern="Solid"/></Style></Styles>'+ws('KH LAF',HEAD+body(laf))+ws('KH LVF',HEAD+body(lvf))+ws('Tổng hợp',kpi+kHead+kBody)+'</Workbook>';
    const blob=new Blob([xml],{type:'application/vnd.ms-excel'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='KeHoachSX_'+iso(new Date()).replace(/-/g,'')+'.xls';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    alert('✅ Đã xuất file Excel: 3 sheet (KH LAF · KH LVF · Tổng hợp). Kiểm tra thư mục Tải xuống.');
  }catch(e){alert('Lỗi xuất Excel: '+e.message);}
};

  recompute();
  const entryList=ORDERS.filter(o=>o.status!=='Đã xuất');
  if(progSel==null||!ORDERS.some(o=>o.stt===progSel&&o.status!=='Đã xuất')){
    const f=entryList.find(o=>o.status==='Đang SX')||entryList[0]||ORDERS[0];
    progSel=f?f.stt:null;
  }
  const sel=ORDERS.find(o=>o.stt===progSel);
  const totLaf=ORDERS.reduce((s,o)=>s+o.lafDone,0);
  const totLvf=ORDERS.reduce((s,o)=>s+o.lvfDone,0);
  const running=ORDERS.filter(o=>o.status==='Đang SX').length;
  const lvfPct=totalPairs?Math.round(totLvf/totalPairs*100):0;
  const opts=entryList.map(o=>`<option value="${o.stt}" ${o.stt===progSel?'selected':''}>#${o.stt} · ${o.tvs} · ${o.code} · ${o.color} (${fmt(o.total)} đôi)</option>`).join('');
  let entry='';
  if(sel){
    const a=ACTUALS[sel.stt]||{laf:{},lvf:{}};
    const srows=SIZES.filter(s=>sel.sizes[s]).map(s=>{
      const plan=sel.sizes[s]||0;
      const laf=(a.laf&&+a.laf[s])||0; const lvf=(a.lvf&&+a.lvf[s])||0;
      const over=lvf>laf;
      const lp=plan?Math.round(lvf/plan*100):0;
      return `<tr>
        <td><b>UK ${s}</b></td>
        <td class="num">${fmt(plan)}</td>
        <td class="num"><input type="number" min="0" value="${laf||''}" placeholder="0" onchange="setActual(${sel.stt},'laf',${s},this.value)" style="width:88px;text-align:right"></td>
        <td class="num"><input type="number" min="0" max="${laf}" value="${lvf||''}" placeholder="0" onchange="setActual(${sel.stt},'lvf',${s},this.value)" style="width:88px;text-align:right;${over?'border-color:var(--red);background:var(--red-soft)':''}"></td>
        <td class="num">${lp}%</td>
        <td>${over?'<span class="badge bg-red">LVF &gt; LAF ✕</span>':(plan&&lvf>=plan?'<span class="badge bg-green">Đủ</span>':(laf>0||lvf>0?'<span class="badge bg-blue">Đang chạy</span>':'<span class="badge bg-gray">—</span>'))}</td>
      </tr>`;
    }).join('');
    const tl=actualTotal(sel.stt,'laf'),tv=actualTotal(sel.stt,'lvf');
    entry=`
    <div class="card" style="margin-bottom:16px">
      <div class="card-h"><h3>Nhập sản lượng — #${sel.stt} · ${sel.code}</h3>
        <span class="sub">${colorChip(sel.color)} ${sel.brand} · ${sel.country} · ${sel.tvs}</span><div class="spacer"></div>
        <select onchange="selProg(this.value)" style="max-width:380px;padding:7px 10px;border:1px solid var(--bd);border-radius:8px">${opts}</select></div>
      <div class="card-pad" style="padding-top:0">
        <div class="note" style="margin:8px 0 14px">⚠️ Ràng buộc: <b>LVF ≤ LAF</b> cho từng size — đầu ra (LVF) không được vượt sản lượng đầu vào (LAF). Hệ thống tự giới hạn khi nhập vượt.</div>
        <div class="tbl-wrap"><table class="tbl">
          <thead><tr><th>Size</th><th class="num">Kế hoạch (đôi)</th><th class="num">LAF thực tế (đầu vào)</th><th class="num">LVF thực tế (đầu ra)</th><th class="num">% so KH</th><th>Trạng thái</th></tr></thead>
          <tbody>${srows}</tbody>
          <tfoot><tr style="font-weight:700;background:var(--bg)"><td>Tổng</td><td class="num">${fmt(sel.total)}</td><td class="num">${fmt(tl)}</td><td class="num">${fmt(tv)} ${tv>tl?'<span class="badge bg-red">vượt LAF</span>':''}</td><td class="num">${sel.total?Math.round(tv/sel.total*100):0}%</td><td>${stBadge(sel.status)}</td></tr></tfoot>
        </table></div>
      </div>
    </div>`;
  }
  const sumRows=ORDERS.map(o=>{
    const pct=o.total?Math.round(o.lvfDone/o.total*100):0;const cls=pct>=90?'':pct>=60?'am':'rd';
    return `<tr style="cursor:pointer" onclick="selProg(${o.stt})">
      <td class="mono">#${o.stt}</td><td class="mono">${o.tvs}</td><td>${colorChip(o.color)}</td><td>${o.country}</td>
      <td class="num">${fmt(o.total)}</td><td class="num">${fmt(o.lafDone)}</td><td class="num">${fmt(o.lvfDone)}</td>
      <td style="min-width:150px"><div class="flex"><div class="meter ${cls}" style="flex:1"><i style="width:${pct}%"></i></div><span class="mono" style="width:38px;text-align:right;font-weight:600">${pct}%</span></div></td>
      <td>${stBadge(o.status)}</td></tr>`;
  }).join('');
  return `
  <div class="page-head"><div><h1>Tiến độ</h1><p>Nhập sản lượng thực tế chi tiết theo đơn hàng / mã hàng / màu / size, so với kế hoạch — ràng buộc LVF ≤ LAF</p></div><div class="spacer"></div><button class="btn" onclick="resetTestData()">♻️ Reset dữ liệu test</button></div>
  <div class="grid kpis" style="margin-bottom:16px">
    ${kpi('LAF thực tế (đầu vào)','🏭','var(--amber-soft)',fmt(totLaf)+' đôi','Tổng nhập từ các lô')}
    ${kpi('LVF thực tế (đầu ra)','👟','var(--green-soft)',fmt(totLvf)+' đôi','Đầu ra ≤ đầu vào LAF')}
    ${kpi('% LVF / kế hoạch','🎯','var(--blue-soft)',lvfPct+'%','Mục tiêu '+fmt(totalPairs)+' đôi')}
    ${kpi('Lô đang chạy','⚙️','var(--blue-soft)',running+' lô','Đang sản xuất')}
  </div>
  ${entry}
  <div class="card"><div class="card-h"><h3>Tổng hợp tiến độ theo đơn hàng</h3><span class="sub">Bấm 1 dòng để nhập sản lượng</span></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>STT</th><th>ĐH TVS</th><th>Màu</th><th>Quốc gia</th><th class="num">Kế hoạch</th><th class="num">LAF</th><th class="num">LVF</th><th>% hoàn thành (LVF)</th><th>Trạng thái</th></tr></thead><tbody>${sumRows}</tbody></table></div>
  </div>`;
}
window.selProg=stt=>{progSel=+stt;mount('progress');};
window.setActual=(stt,f,size,val)=>{
  val=Math.max(0,Math.round(+val||0));
  const a=ACTUALS[stt]=ACTUALS[stt]||{laf:{},lvf:{}};
  a.laf=a.laf||{};a.lvf=a.lvf||{};
  if(f==='lvf'){const laf=+(a.laf[size]||0);if(val>laf){alert('⛔ LVF ('+fmt(val)+') không được vượt LAF ('+fmt(laf)+') ở UK'+size+'.\nĐầu ra không thể vượt đầu vào — đã giới hạn về '+fmt(laf)+'.');val=laf;}}
  a[f][size]=val;
  if(f==='laf'){const lvf=+(a.lvf[size]||0);if(lvf>val){a.lvf[size]=val;}}
  saveState();recompute();mount('progress');
};

/* ===== SCREEN: Tồn kho NVL ===== */
function renderMaterials(){
  const crit=MAT.filter(m=>m.status==='critical').length;
  const cards=MAT.map(m=>{const pct=Math.min(100,Math.round(m.stock/(m.safety*1.5)*100));const cls=m.status==='critical'?'rd':m.status==='low'?'am':'';const bd={ok:'bg-green',low:'bg-amber',critical:'bg-red'}[m.status];const lab={ok:'Đủ',low:'Dưới ngưỡng',critical:'Thiếu'}[m.status];
    return `<tr><td><b>${m.name}</b><div class="muted" style="font-size:11px">${m.grp} · ${m.sup}</div></td>
    <td class="num mono">${fmt(m.stock)} ${m.unit}</td><td class="num mono">${fmt(m.safety)}</td>
    <td class="num mono">${m.per}</td><td class="num mono">${fmt(m.need)}</td>
    <td style="min-width:140px"><div class="meter ${cls}"><i style="width:${pct}%"></i></div></td>
    <td><span class="badge ${bd}">${lab}</span></td>
    <td>${m.status!=='ok'?'<button class="btn sm">＋ Đề xuất mua</button>':'<span class="muted">—</span>'}</td></tr>`;}).join('');
  return `
  <div class="page-head"><div><h1>Tồn kho NVL</h1><p>Cao su · hoá chất · vải thun · khoen — tự tính nhu cầu theo kế hoạch &amp; cảnh báo thiếu trước ngày SX</p></div><div class="spacer"></div><button class="btn">＋ Nhập tồn kho</button><button class="btn pri">📋 Tạo đề xuất mua</button></div>
  <div class="grid kpis" style="margin-bottom:16px">
    ${kpi('Loại NVL','📦','var(--blue-soft)',MAT.length,'4 nhóm vật tư')}
    ${kpi('Cảnh báo thiếu','⚠️','var(--red-soft)',crit,'< tồn an toàn')}
    ${kpi('Dưới ngưỡng','🟡','var(--amber-soft)',MAT.filter(m=>m.status==='low').length,'cần theo dõi')}
    ${kpi('Đề xuất mua mở','🛒','var(--green-soft)',crit,'chờ duyệt thu mua')}
  </div>
  <div class="card"><div class="card-h"><h3>Tồn kho &amp; nhu cầu theo kế hoạch</h3></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Vật tư</th><th class="num">Tồn kho</th><th class="num">Tồn an toàn</th><th class="num">ĐM/đôi</th><th class="num">Nhu cầu KH</th><th>Mức tồn</th><th>Trạng thái</th><th></th></tr></thead><tbody>${cards}</tbody></table></div>
  </div>`;
}

/* ===== SCREEN: Xuất hàng ===== */
function renderShipment(){
  const ready=ORDERS.filter(o=>o.status==='Hoàn tất');
  const shipped=ORDERS.filter(o=>o.status==='Đã xuất');
  const onTime=Math.round(shipped.length/(shipped.length+1)*100+8);
  const rrows=ready.map(o=>`<tr><td class="mono">${o.tvs}</td><td>${colorChip(o.color)}</td><td>${o.country}</td><td class="num">${fmt(o.total)}</td><td>${o.deadline.split('-').reverse().join('/')}</td><td>${stBadge(o.status)}</td><td><button class="btn sm grn">✓ Xác nhận xuất</button></td></tr>`).join('');
  const srows=shipped.map(o=>`<tr><td class="mono">${o.tvs}</td><td>${colorChip(o.color)}</td><td>${o.country}</td><td class="num">${fmt(o.total)}</td><td>${o.deadline.split('-').reverse().join('/')}</td><td>CONT-${1000+(+o.stt)}</td><td><span class="badge bg-green">✓ Đúng hạn</span></td></tr>`).join('');
  return `
  <div class="page-head"><div><h1>Xuất hàng</h1><p>Kho vận xác nhận lô đã đóng thùng &amp; giao cho Tuấn Việt đúng ngày — cập nhật trạng thái đơn hàng</p></div></div>
  <div class="grid kpis" style="margin-bottom:16px">
    ${kpi('On-time delivery','🎯','var(--green-soft)',onTime+'%','Tổng hợp cho Admin')}
    ${kpi('Sẵn sàng xuất','📦','var(--amber-soft)',ready.length+' lô','Đã hoàn tất tại LVF')}
    ${kpi('Đã xuất','🚚','var(--blue-soft)',shipped.length+' lô',fmt(shipped.reduce((s,o)=>s+o.total,0))+' đôi')}
    ${kpi('Trễ hạn','⏰','var(--red-soft)','0','Tháng này')}
  </div>
  <div class="card" style="margin-bottom:16px"><div class="card-h"><h3>Lô sẵn sàng xuất</h3><span class="sub">${ready.length} lô</span></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>ĐH TVS</th><th>Màu</th><th>Quốc gia</th><th class="num">SL</th><th>Ngày giao</th><th>Trạng thái</th><th></th></tr></thead><tbody>${rrows||'<tr><td colspan=7 class="muted">Không có lô nào</td></tr>'}</tbody></table></div>
  </div>
  <div class="card"><div class="card-h"><h3>Lịch sử xuất hàng</h3><span class="sub">${shipped.length} lô</span></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>ĐH TVS</th><th>Màu</th><th>Quốc gia</th><th class="num">SL</th><th>Ngày giao</th><th>Container</th><th>Trạng thái</th></tr></thead><tbody>${srows}</tbody></table></div>
  </div>`;
}

/* ===== SCREEN: Kế hoạch cập nhật theo đơn đặt hàng mới ===== */
function renderRevisions(){
  const revs=[...REVISIONS].reverse();
  const head=`
  <div class="page-head"><div><h1>Kế hoạch cập nhật theo đơn đặt hàng mới</h1><p>Mỗi lần thêm/đổi đơn hàng, hệ thống tự đẩy lại kế hoạch và lưu một bản tại đây — phục vụ truy vết &amp; báo cáo BGĐ. Khách đặt 2 lần/tháng → mỗi đợt là một bản xoay kế hoạch.</p></div><div class="spacer"></div>${REVISIONS.length?'<button class="btn" onclick="clearRevs()">🗑️ Xoá lịch sử</button>':''}<button class="btn pri" onclick="snapNow()">📌 Ghi lại bản hiện tại</button></div>`;
  if(!revs.length) return head+`<div class="card card-pad"><div class="note">Chưa có bản cập nhật nào. Vào màn <b>Đơn hàng → ＋ Thêm đơn thủ công</b> để nhập đơn mới — hệ thống sẽ tự đẩy kế hoạch và ghi bản đầu tiên vào đây.</div></div>`;
  const cards=revs.map((rev,idx)=>{
    const ver=REVISIONS.length-idx;
    const prev=REVISIONS[REVISIONS.length-idx-2];
    const dOrd=prev?rev.orderCount-prev.orderCount:rev.orderCount;
    const dPair=prev?rev.totalPairs-prev.totalPairs:rev.totalPairs;
    const when=new Date(rev.ts).toLocaleString('vi-VN');
    const lafEnd=rev.rows.filter(r=>r.factory==='LAF').reduce((m,r)=>r.end>m?r.end:m,'');
    const lvfEnd=rev.rows.filter(r=>r.factory==='LVF').reduce((m,r)=>r.end>m?r.end:m,'');
    const detRows=rev.rows.map(r=>`<tr><td><span class="badge ${r.factory==='LAF'?'bg-amber':'bg-blue'}">${r.factory}</span></td><td>${colorChip(r.color)} <span class="muted">${r.key}</span></td><td>${r.start.split('-').reverse().join('/')}</td><td>${r.end.split('-').reverse().join('/')}</td><td class="num">${r.days} ngày</td><td class="num">${fmt(r.daily)}</td><td class="num">${fmt(r.total)}</td><td>${(r.deadline||'').split('-').reverse().join('/')}</td></tr>`).join('');
    return `<div class="card" style="margin-bottom:16px"><div class="card-h"><h3>Bản #${ver} · ${when}</h3><div class="spacer"></div><span class="badge ${dPair>0?'bg-green':(dPair<0?'bg-red':'bg-gray')}">${dOrd>=0?'+':''}${dOrd} đơn · ${dPair>=0?'+':''}${fmt(dPair)} đôi so bản trước</span></div><div class="card-pad"><div class="note" style="margin-bottom:12px">📦 Nguyên nhân: <b>${rev.trigger}</b> · Chế độ solver: <b>${rev.mode}</b></div><div class="grid kpis" style="margin-bottom:14px">${kpi('Tổng đơn','📦','var(--blue-soft)',rev.orderCount,'đơn trong bản')}${kpi('Tổng sản lượng','👟','var(--green-soft)',fmt(rev.totalPairs)+' đôi','mục tiêu giao')}${kpi('LAF xong ~','🏭','var(--amber-soft)',lafEnd?lafEnd.split('-').reverse().join('/'):'—','BTP hoàn tất')}${kpi('LVF xong ~','🚚','var(--blue-soft)',lvfEnd?lvfEnd.split('-').reverse().join('/'):'—','giao cuối')}</div><details><summary style="cursor:pointer;font-weight:600;font-size:13px">Xem lịch chi tiết (${rev.rows.length} lô)</summary><div class="tbl-wrap" style="margin-top:10px"><table class="tbl"><thead><tr><th>Nhà máy</th><th>Nhóm</th><th>Bắt đầu</th><th>Kết thúc</th><th class="num">Khoảng TG</th><th class="num">SL/ngày</th><th class="num">Tổng SL</th><th>Deadline</th></tr></thead><tbody>${detRows}</tbody></table></div></details></div></div>`;
  }).join('');
  return head+cards;
}
window.snapNow=()=>{const l=prompt('Ghi chú cho bản kế hoạch này:','Cập nhật thủ công');if(l===null)return;snapshotPlan(l||'Cập nhật thủ công');alert('📌 Đã ghi lại bản kế hoạch hiện tại.');mount('revisions');};
window.clearRevs=()=>{if(!confirm('Xoá toàn bộ lịch sử bản cập nhật kế hoạch? (không ảnh hưởng đơn hàng)'))return;REVISIONS=[];saveState();mount('revisions');};

/* ===== ROUTER ===== */
const SCREENS={dashboard:{t:'Dashboard',f:renderDashboard},orders:{t:'Đơn hàng',f:renderOrders},test:{t:'Cấu hình Test',f:renderTest},capacity:{t:'Năng xuất MT',f:renderCapacity},plan:{t:'Kế hoạch SX',f:renderPlan},revisions:{t:'Kế hoạch cập nhật theo đơn đặt hàng mới',f:renderRevisions},progress:{t:'Tiến độ',f:renderProgress},materials:{t:'Tồn kho NVL',f:renderMaterials},shipment:{t:'Xuất hàng',f:renderShipment}};
function mount(id){
  const s=SCREENS[id]; if(!s)return;
  $('#content').innerHTML=s.f();
  $$('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.s===id));
  $('#crumbTitle').textContent=s.t;
  window.scrollTo(0,0);
  location.hash=id;
}
window.go=id=>mount(id);
window.addEventListener('DOMContentLoaded',()=>{
  const tb=document.querySelector('.topbar');
  if(tb){const b=document.createElement('button');b.className='btn sm';b.innerHTML='♻️ Reset dữ liệu test';b.title='Xoá toàn bộ dữ liệu test, giữ nguyên đơn hàng gốc';b.onclick=()=>window.resetTestData();tb.appendChild(b);}
  runSolver();mount(location.hash.slice(1)||'dashboard');
});

</script>
</body>
</html>
